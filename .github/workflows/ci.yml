name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: "0"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: ["--no-default-features", "--features json", "--all-features"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets ${{ matrix.features }}
      - run: cargo test --doc ${{ matrix.features }}

  msrv:
    name: msrv (1.82.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.82.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-features

  docs:
    name: docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features

  no_std:
    name: no_std (thumbv7em)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target thumbv7em-none-eabihf --no-default-features

  wasm:
    name: wasm32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target wasm32-unknown-unknown --no-default-features

  vectors:
    name: frozen vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd tests/vectors && sha256sum -c SHA256SUMS

  deny:
    name: cargo-deny (licenses, advisories, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  fuzz-build:
    name: fuzz build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - run: cargo fuzz build --target x86_64-unknown-linux-gnu

  security:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  # ── added in 0.9.0: maximal CI surface ──────────────────────────────

  typos:
    name: Spelling (typos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  test-beta:
    name: Test (beta)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@beta
      - uses: Swatinem/rust-cache@v2
      - run: cargo +beta test --all-features --verbose

  doctests:
    name: Doctests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --doc --all-features --verbose

  build-cortex-m33:
    name: Bare-metal build (Cortex-M33)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target thumbv8m.main-none-eabihf --no-default-features --release

  miri:
    name: Miri (UB detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: cargo miri test (library)
        run: cargo +nightly miri test --lib
        env:
          MIRIFLAGS: -Zmiri-strict-provenance

  coverage:
    name: Coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage summary
        run: cargo llvm-cov --all-features --summary-only

  package:
    name: Package (publish dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --dry-run

  integrity:
    name: Repository integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Licence files present
        run: |
          test -f LICENSE
          test -f LICENSE-APACHE
          test -f LICENSE-MIT
          echo "all licence files present"
      - name: SPDX identifier present
        run: |
          grep -q 'SPDX-License-Identifier: Apache-2.0 OR MIT' LICENSE
          echo "SPDX identifier present"
      - name: Frozen vectors present and verified
        run: |
          test -f tests/vectors/consent-interop-vectors-v0.1.0.json
          test -f tests/vectors/SHA256SUMS
          cd tests/vectors && sha256sum -c SHA256SUMS
          echo "frozen vectors present and verified"

  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - fmt
      - clippy
      - typos
      - test
      - test-beta
      - msrv
      - doctests
      - docs
      - no_std
      - build-cortex-m33
      - wasm
      - miri
      - vectors
      - fuzz-build
      - deny
      - security
      - coverage
      - package
      - integrity
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "one or more required jobs failed"
            exit 1
          fi
          echo "all required CI jobs passed"
